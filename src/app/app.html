<div class="app-shell">
  <mat-toolbar color="primary" class="topbar" aria-label="Application navigation">
    <span class="brand" routerLink="">Budget Lens</span>

    @if (isAuthenticated()) {
      <nav class="primary-nav" aria-label="Primary">
        <a mat-button routerLink="/transactions" routerLinkActive="active-link">Transactions</a>
        <a mat-button routerLink="/add-transaction" routerLinkActive="active-link"
          >Add Transaction</a
        >
        <a mat-button routerLink="/profile" routerLinkActive="active-link">Profile</a>
        <a mat-button routerLink="/categories" routerLinkActive="active-link">Categories</a>
        <button mat-button type="button" (click)="logout()">Logout</button>
      </nav>
    } @else {
      <nav class="primary-nav" aria-label="Primary">
        <a mat-button routerLink="/login" routerLinkActive="active-link">Login</a>
        <a mat-button routerLink="/register" routerLinkActive="active-link">Register</a>
      </nav>
    }
  </mat-toolbar>

  <main class="page-container">
    <router-outlet></router-outlet>
  </main>

  <footer class="app-footer" aria-label="Application footer">
    <span>CS313 Assignment 5</span>
    <span>Budget Lens</span>
  </footer>
</div>
